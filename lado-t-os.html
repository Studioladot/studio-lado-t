<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lado T — Sistema Operativo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f9f8f6;--surface:#fff;--surface2:#f1efe8;--border:#d3d1c7;--border2:#b4b2a9;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#b4b2a9;
  --blue:#185fa5;--blue-bg:#e6f1fb;--blue-dark:#0c447c;
  --green:#3b6d11;--green-bg:#eaf3de;
  --amber:#854f0b;--amber-bg:#faeeda;
  --red:#a32d2d;--red-bg:#fcebeb;
  --purple:#3c3489;--purple-bg:#eeedfe;
  --teal:#0f6e56;--teal-bg:#e1f5ee;
  --r:8px;--rl:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

/* AUTH */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:40px 36px;width:100%;max-width:380px}
.auth-logo{font-size:24px;font-weight:600;letter-spacing:-0.02em;margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--text2);margin-bottom:32px}
.auth-tabs{display:flex;gap:0;margin-bottom:24px;border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.auth-tab{flex:1;padding:8px;font-size:13px;border:none;background:transparent;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s}
.auth-tab.active{background:var(--blue);color:#fff;font-weight:500}
.auth-field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.auth-field label{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:0.05em}
.auth-field input{border:0.5px solid var(--border);border-radius:var(--r);padding:9px 12px;font-size:14px;background:transparent;color:var(--text);outline:none;transition:border-color .15s;font-family:inherit}
.auth-field input:focus{border-color:var(--blue)}
.auth-btn{width:100%;padding:10px;border-radius:20px;border:none;background:var(--blue);color:#fff;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px;font-family:inherit;transition:background .15s}
.auth-btn:hover{background:var(--blue-dark)}
.auth-btn:disabled{opacity:.6;cursor:not-allowed}
.auth-error{font-size:12px;color:var(--red);background:var(--red-bg);border-radius:var(--r);padding:8px 12px;margin-top:10px}
.auth-msg{font-size:12px;color:var(--green);background:var(--green-bg);border-radius:var(--r);padding:8px 12px;margin-top:10px}

/* APP LAYOUT */
#app-screen{display:none;min-height:100vh}
.sidebar{position:fixed;top:0;left:0;width:220px;height:100vh;background:var(--surface);border-right:0.5px solid var(--border);padding:20px 12px;display:flex;flex-direction:column;z-index:50}
.sidebar-logo{font-size:18px;font-weight:600;letter-spacing:-0.02em;padding:4px 8px;margin-bottom:4px}
.sidebar-tagline{font-size:11px;color:var(--text3);padding:0 8px;margin-bottom:24px}
.sidebar-section{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;padding:0 8px;margin-bottom:6px;margin-top:16px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r);font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;user-select:none}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--blue);font-weight:500}
.nav-item .icon{font-size:16px;width:18px;text-align:center}
.sidebar-bottom{margin-top:auto;padding-top:12px;border-top:0.5px solid var(--border)}
.user-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--blue);flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-email{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:inherit;padding:2px 0}
.logout-btn:hover{color:var(--red)}

.main{margin-left:220px;padding:28px 32px;min-height:100vh}
.page{display:none}
.page.active{display:block}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-title{font-size:20px;font-weight:500;letter-spacing:-0.01em}
.page-sub{font-size:13px;color:var(--text2);margin-top:3px}

/* COMPONENTS */
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;padding:8px 18px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-weight:400;transition:all .15s;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:500}
.btn.primary:hover{background:var(--blue-dark)}
.btn.danger{border-color:#f7c1c1;color:var(--red)}
.btn.danger:hover{background:var(--red-bg)}
.btn.sm{font-size:11px;padding:4px 12px}

.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px}
.badge.green{background:var(--green-bg);color:var(--green)}
.badge.amber{background:var(--amber-bg);color:var(--amber)}
.badge.red{background:var(--red-bg);color:var(--red)}
.badge.blue{background:var(--blue-bg);color:var(--blue)}
.badge.purple{background:var(--purple-bg);color:var(--purple)}
.badge.teal{background:var(--teal-bg);color:var(--teal)}
.badge.gray{background:var(--surface2);color:var(--text2)}

.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:16px}
.card.selected{border:1.5px solid var(--blue)}
.card.clickable{cursor:pointer;transition:border-color .15s}
.card.clickable:hover{border-color:var(--border2)}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:24px}
.stat-card{background:var(--surface2);border-radius:var(--r);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:5px}
.stat-value{font-size:22px;font-weight:500}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}

.section-label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px}
.divider{height:0.5px;background:var(--border);margin:20px 0}

.form-block{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:14px}
.form-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.field{display:flex;flex-direction:column;gap:4px;flex:1 1 160px}
.field.wide{flex:1 1 100%}
.field.sm{flex:0 1 120px}
.field label{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:0.05em}
.field input,.field select,.field textarea{border:0.5px solid var(--border);border-radius:var(--r);padding:7px 10px;font-size:13px;background:transparent;color:var(--text);outline:none;transition:border-color .15s;font-family:inherit;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue)}
.field textarea{resize:vertical}

.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-row input,.filter-row select{border:0.5px solid var(--border);border-radius:var(--r);padding:7px 12px;font-size:13px;background:transparent;color:var(--text);outline:none;font-family:inherit}
.filter-row input{flex:1 1 200px}

.ad-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.ad-card-name{font-size:13px;font-weight:500;margin-bottom:3px}
.ad-card-sub{font-size:12px;color:var(--text2);margin-bottom:8px}
.ad-card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.ad-card-metrics{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;min-height:22px}
.ad-card-actions{display:flex;gap:6px}

.metric-block{border:0.5px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px;background:var(--surface)}
.metric-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.metric-badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

.back-btn{font-size:13px;color:var(--blue);background:none;border:none;cursor:pointer;padding:0;margin-bottom:18px;display:flex;align-items:center;gap:4px;font-family:inherit}
.back-btn:hover{text-decoration:underline}

.detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.detail-title{font-size:18px;font-weight:500;margin-bottom:4px}
.detail-sub{font-size:13px;color:var(--text2)}

.empty{text-align:center;padding:52px 20px;color:var(--text3);border:0.5px dashed var(--border);border-radius:var(--rl)}
.empty .empty-icon{font-size:32px;margin-bottom:12px}
.empty p{font-size:13px;margin-bottom:6px}
.empty a{color:var(--blue);cursor:pointer}

.recent-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border);flex-wrap:wrap}
.recent-row:last-child{border-bottom:none}

.ranking-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.ranking-row:last-child{border-bottom:none}
.ranking-num{font-size:13px;font-weight:500;color:var(--text3);width:20px;flex-shrink:0}
.ranking-info{flex:1;min-width:0}
.ranking-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ranking-sub{font-size:11px;color:var(--text2)}

.tag-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid var(--border);cursor:pointer;transition:all .15s;background:transparent;color:var(--text2);font-family:inherit}
.tag-pill:hover,.tag-pill.active{background:var(--purple-bg);color:var(--purple);border-color:var(--purple)}

.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100}
.confirm-box{background:var(--surface);border-radius:var(--rl);padding:24px;max-width:360px;width:90%}
.confirm-title{font-size:15px;font-weight:500;margin-bottom:8px}
.confirm-body{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.confirm-actions{display:flex;gap:8px;justify-content:flex-end}

.import-area{border:1.5px dashed var(--border);border-radius:var(--rl);padding:24px;text-align:center;font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s}
.import-area:hover{border-color:var(--blue);color:var(--blue)}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .2s}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;padding:16px}
  .mobile-header{display:flex!important}
}
.mobile-header{display:none;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:40}
.hamburger{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text)}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Lado T</div>
    <div class="auth-sub">Sistema Operativo de Negocios</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Ingresar</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Registrarse</button>
    </div>
    <div id="auth-login">
      <div class="auth-field"><label>Email</label><input type="email" id="login-email" placeholder="tu@email.com"/></div>
      <div class="auth-field"><label>Contraseña</label><input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button class="auth-btn" onclick="doLogin()" id="login-btn">Ingresar</button>
      <div id="login-msg"></div>
    </div>
    <div id="auth-register" style="display:none">
      <div class="auth-field"><label>Nombre</label><input type="text" id="reg-name" placeholder="Tu nombre"/></div>
      <div class="auth-field"><label>Email</label><input type="email" id="reg-email" placeholder="tu@email.com"/></div>
      <div class="auth-field"><label>Contraseña</label><input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" onkeydown="if(event.key==='Enter')doRegister()"/></div>
      <button class="auth-btn" onclick="doRegister()" id="reg-btn">Crear cuenta</button>
      <div id="reg-msg"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="mobile-header">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <span style="font-size:16px;font-weight:600">Lado T</span>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">Lado T</div>
    <div class="sidebar-tagline">Sistema Operativo</div>
    <div class="sidebar-section">Principal</div>
    <div class="nav-item active" onclick="showPage('dashboard')" data-page="dashboard"><span class="icon">◈</span>Dashboard</div>
    <div class="sidebar-section">Publicidad</div>
    <div class="nav-item" onclick="showPage('ads')" data-page="ads"><span class="icon">◎</span>Meta Ads</div>
    <div class="nav-item" onclick="showPage('scripts')" data-page="scripts"><span class="icon">✎</span>Guiones</div>
    <div class="sidebar-section">Próximamente</div>
    <div class="nav-item" style="opacity:.4;cursor:default"><span class="icon">◷</span>Calendario</div>
    <div class="nav-item" style="opacity:.4;cursor:default"><span class="icon">◑</span>Contenido</div>
    <div class="nav-item" style="opacity:.4;cursor:default"><span class="icon">◉</span>Finanzas</div>
    <div class="nav-item" style="opacity:.4;cursor:default"><span class="icon">◐</span>CRM</div>
    <div class="sidebar-bottom">
      <div class="user-row">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info">
          <div id="user-name" style="font-size:12px;font-weight:500"></div>
          <div class="user-email" id="user-email-display"></div>
          <button class="logout-btn" onclick="doLogout()">Cerrar sesión</button>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <div class="page-header">
        <div><div class="page-title">Dashboard</div><div class="page-sub">Resumen general de tu negocio</div></div>
        <button class="btn primary" onclick="showPage('ads');addAd()">+ Nuevo anuncio</button>
      </div>
      <div class="stat-grid" id="dash-stats"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;flex-wrap:wrap" id="dash-grid">
        <div class="card" id="dash-recent-container"></div>
        <div class="card" id="dash-ranking-container"></div>
      </div>
      <div id="dash-import" style="margin-top:20px"></div>
    </div>

    <!-- ADS -->
    <div class="page" id="page-ads">
      <div id="ads-list-view">
        <div class="page-header">
          <div><div class="page-title">Centro Meta Ads</div><div class="page-sub">Biblioteca de anuncios y métricas</div></div>
          <button class="btn primary" onclick="addAd()">+ Nuevo anuncio</button>
        </div>
        <div class="filter-row">
          <input type="text" id="search-input" placeholder="Buscar por nombre, ángulo, campaña..." oninput="renderAdList()"/>
          <select id="filter-status" onchange="renderAdList()">
            <option value="">Todos los estados</option>
            <option>Activo</option><option>Pausado</option><option>Winner</option><option>Escalando</option><option>Eliminado</option>
          </select>
          <select id="filter-stage" onchange="renderAdList()">
            <option value="">Todas las etapas</option>
            <option>Tester ABO</option><option>Deep Pocket CBO</option><option>Retargeting</option><option>Tráfico</option>
          </select>
        </div>
        <div style="margin-bottom:14px" id="tag-filters"></div>
        <div class="ad-grid" id="ad-grid"></div>
      </div>
      <div id="ads-detail-view" style="display:none"></div>
    </div>

    <!-- SCRIPTS -->
    <div class="page" id="page-scripts">
      <div id="scripts-list-view">
        <div class="page-header">
          <div><div class="page-title">Guiones</div><div class="page-sub">Biblioteca de scripts y copy</div></div>
          <button class="btn primary" onclick="addScript()">+ Nuevo guion</button>
        </div>
        <div class="ad-grid" id="script-grid"></div>
      </div>
      <div id="scripts-detail-view" style="display:none"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="confirm-modal"></div>

<script>
const SUPA_URL = 'https://vluoynizpvckjqomojxx.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsdW95bml6cHZja2pxb21vanh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMzE4MTQsImV4cCI6MjA5NjYwNzgxNH0.ItNRCYNzKYvs_S_ToOSOwKesRGZvniq0-kFNKcqZFPM';
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

const BREAKEVEN_CPA = 18.33;
const BREAKEVEN_ROAS = 2.5;
const TARGET_ROAS = 3.5;
const STATUS_OPTS = ['Activo','Pausado','Winner','Escalando','Eliminado'];
const ANGLE_OPTS = ['Prueba Social','Urgencia / Escasez','Modelado / Producto en uso','Necesidad emocional','Promoción','Valor / Precio','Versatilidad','Marca local','Identidad / Tribu','FAQ','Comparativa','Antes / Después','UGC','Otro'];
const FORMAT_OPTS = ['Video vertical (Reels)','Imagen estática','Carrusel','Video horizontal'];
const STAGE_OPTS = ['Tester ABO','Deep Pocket CBO','Retargeting','Tráfico'];
const TAG_OPTS = ['Oferta','Beneficio','Problema','Storytelling','UGC','Comparativa','Autoridad','Humor','Testimonio','Urgencia'];
const STATUS_COLOR = {Activo:'green',Winner:'blue',Escalando:'purple',Pausado:'amber',Eliminado:'red'};

let currentUser = null;
let ads = [];
let scripts = [];
let selectedAdId = null;
let selectedScriptId = null;
let saving = false;
let activeTagFilter = '';

function uid(){ return Date.now()+'_'+Math.random().toString(36).slice(2); }
function now(){ return new Date().toISOString().slice(0,10); }
function nowTime(){ return new Date().toTimeString().slice(0,5); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toast(msg,dur=2200){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

function confirm2(title,body,action){
  const m=document.getElementById('confirm-modal');
  m.innerHTML=`<div class="confirm-overlay" onclick="closeConfirm()"><div class="confirm-box" onclick="event.stopPropagation()">
    <div class="confirm-title">${esc(title)}</div><div class="confirm-body">${esc(body)}</div>
    <div class="confirm-actions"><button class="btn" onclick="closeConfirm()">Cancelar</button>
    <button class="btn danger" onclick="confirmDo()">Confirmar</button></div></div></div>`;
  window._confirmAction=action;
}
window.closeConfirm=()=>{ document.getElementById('confirm-modal').innerHTML=''; };
window.confirmDo=()=>{ if(window._confirmAction)window._confirmAction(); closeConfirm(); };

// ── AUTH ──────────────────────────────────────────────────────────────────
function switchAuthTab(t){
  document.querySelectorAll('.auth-tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='login')||(i===1&&t==='register')));
  document.getElementById('auth-login').style.display=t==='login'?'block':'none';
  document.getElementById('auth-register').style.display=t==='register'?'block':'none';
}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const btn=document.getElementById('login-btn');
  const msg=document.getElementById('login-msg');
  if(!email||!pass){msg.className='auth-error';msg.textContent='Completá todos los campos.';return;}
  btn.disabled=true;btn.textContent='Ingresando...';
  const {data,error}=await db.auth.signInWithPassword({email,password:pass});
  btn.disabled=false;btn.textContent='Ingresar';
  if(error){msg.className='auth-error';msg.textContent=error.message;return;}
  msg.innerHTML='';
}

async function doRegister(){
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pass=document.getElementById('reg-pass').value;
  const btn=document.getElementById('reg-btn');
  const msg=document.getElementById('reg-msg');
  if(!name||!email||!pass){msg.className='auth-error';msg.textContent='Completá todos los campos.';return;}
  if(pass.length<6){msg.className='auth-error';msg.textContent='La contraseña debe tener al menos 6 caracteres.';return;}
  btn.disabled=true;btn.textContent='Creando cuenta...';
  const {data,error}=await db.auth.signUp({email,password:pass,options:{data:{name}}});
  btn.disabled=false;btn.textContent='Crear cuenta';
  if(error){msg.className='auth-error';msg.textContent=error.message;return;}
  msg.className='auth-msg';msg.textContent='Cuenta creada. Ya podés ingresar.';
}

async function doLogout(){
  await db.auth.signOut();
  ads=[];scripts=[];currentUser=null;
  document.getElementById('app-screen').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}

db.auth.onAuthStateChange(async(event,session)=>{
  if(session?.user){
    currentUser=session.user;
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app-screen').style.display='block';
    const initials=(currentUser.user_metadata?.name||currentUser.email||'U').slice(0,1).toUpperCase();
    document.getElementById('user-avatar').textContent=initials;
    document.getElementById('user-name').textContent=currentUser.user_metadata?.name||'';
    document.getElementById('user-email-display').textContent=currentUser.email;

    renderScriptList();

});

// ── DATA ──────────────────────────────────────────────────────────────────
async function loadAll(){
  const [adsRes,scriptsRes]=await Promise.all([
    db.from('ads').select('*').order('updated_at',{ascending:false}),
    db.from('scripts').select('*').order('updated_at',{ascending:false})
  ]);
  ads=(adsRes.data||[]).map(r=>({...r.data,id:r.id}));
  scripts=(scriptsRes.data||[]).map(r=>({...r.data,id:r.id}));
}

async function saveAd(ad){
  if(saving)return;
  const {error}=await db.from('ads').upsert({id:ad.id,user_id:currentUser.id,data:ad,updated_at:new Date().toISOString()});
  if(error)toast('Error al guardar: '+error.message,3000);
}

async function saveScript(s){
  const {error}=await db.from('scripts').upsert({id:s.id,user_id:currentUser.id,data:s,updated_at:new Date().toISOString()});
  if(error)toast('Error al guardar: '+error.message,3000);
}

async function deleteAdDB(id){
  await db.from('ads').delete().eq('id',id);
}
async function deleteScriptDB(id){
  await db.from('scripts').delete().eq('id',id);
}

// ── NAVIGATION ────────────────────────────────────────────────────────────
function showPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item[data-page]').forEach(el=>el.classList.toggle('active',el.dataset.page===p));
  document.getElementById('page-'+p).classList.add('active');
  if(p==='ads'&&!selectedAdId)renderAdList();
  if(p==='scripts'&&!selectedScriptId)renderScriptList();
  if(p==='dashboard')renderDashboard();
  document.getElementById('sidebar').classList.remove('open');
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
}

// ── BADGES ────────────────────────────────────────────────────────────────
function roasBadge(v){
  if(!v||v==='')return '<span style="color:var(--text3)">—</span>';
  const n=parseFloat(v);if(isNaN(n))return '<span style="color:var(--text3)">—</span>';
  const c=n>=TARGET_ROAS?'green':n>=BREAKEVEN_ROAS?'amber':'red';
  return `<span class="badge ${c}">${n.toFixed(2)}×</span>`;
}
function cpaBadge(v){
  if(!v||v==='')return '<span style="color:var(--text3)">—</span>';
  const n=parseFloat(v);if(isNaN(n))return '<span style="color:var(--text3)">—</span>';
  const c=n<=12?'green':n<=BREAKEVEN_CPA?'amber':'red';
  return `<span class="badge ${c}">u$s ${n.toFixed(2)}</span>`;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────
function renderDashboard(){
  const allM=ads.flatMap(a=>(a.metrics||[]).map(m=>({...m,adName:a.adName,angle:a.angle,adId:a.id})));
  const withR=allM.filter(m=>m.roas&&parseFloat(m.roas)>0);
  const winners=ads.filter(a=>a.status==='Winner'||a.status==='Escalando').length;
  const active=ads.filter(a=>a.status==='Activo').length;
  const totalSpend=allM.reduce((s,m)=>s+(parseFloat(m.spend)||0),0);
  const totalP=allM.reduce((s,m)=>s+(parseInt(m.purchases)||0),0);
  const avgR=withR.length>0?withR.reduce((s,m)=>s+parseFloat(m.roas),0)/withR.length:null;
  const avgC=avgR?totalSpend/Math.max(totalP,1):null;

  document.getElementById('dash-stats').innerHTML=`
    <div class="stat-card"><div class="stat-label">Anuncios activos</div><div class="stat-value">${active}</div><div class="stat-sub">en testeo</div></div>
    <div class="stat-card"><div class="stat-label">Winners</div><div class="stat-value" style="color:var(--green)">${winners}</div><div class="stat-sub">confirmados</div></div>
    <div class="stat-card"><div class="stat-label">Total anuncios</div><div class="stat-value">${ads.length}</div><div class="stat-sub">en sistema</div></div>
    <div class="stat-card"><div class="stat-label">Gasto total</div><div class="stat-value">u$s ${totalSpend.toFixed(2)}</div><div class="stat-sub">acumulado</div></div>
    <div class="stat-card"><div class="stat-label">Compras</div><div class="stat-value">${totalP}</div><div class="stat-sub">registradas</div></div>
    <div class="stat-card"><div class="stat-label">ROAS promedio</div><div class="stat-value" style="color:${avgR?(avgR>=TARGET_ROAS?'var(--green)':avgR>=BREAKEVEN_ROAS?'var(--amber)':'var(--red)'):'var(--text)'}">${avgR?avgR.toFixed(2)+'×':'—'}</div><div class="stat-sub">breakeven ${BREAKEVEN_ROAS}×</div></div>
  `;

  const recent=allM.sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time)).slice(0,6);
  document.getElementById('dash-recent-container').innerHTML=`
    <div class="section-label">Últimas métricas</div>
    ${recent.length===0?'<div style="color:var(--text3);font-size:13px">Sin métricas todavía.</div>':
      recent.map(m=>`<div class="recent-row">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m.adName)||'Anuncio'}</div>
          <div style="font-size:11px;color:var(--text2)">${esc(m.angle||'')} — ${m.date} ${m.time}</div>
        </div>
        ${roasBadge(m.roas)}${cpaBadge(m.cpa)}
        ${m.purchases?`<span style="font-size:12px;color:var(--text2)">${m.purchases} compras</span>`:''}
      </div>`).join('')}
  `;

  const ranked=[...ads].filter(a=>{
    const lastM=(a.metrics||[]).slice(-1)[0];
    return lastM&&parseFloat(lastM.roas)>0;
  }).sort((a,b)=>{
    const ra=parseFloat((a.metrics||[]).slice(-1)[0]?.roas||0);
    const rb=parseFloat((b.metrics||[]).slice(-1)[0]?.roas||0);
    return rb-ra;
  }).slice(0,5);

  document.getElementById('dash-ranking-container').innerHTML=`
    <div class="section-label">Ranking por ROAS</div>
    ${ranked.length===0?'<div style="color:var(--text3);font-size:13px">Sin datos suficientes.</div>':
      ranked.map((a,i)=>{
        const m=(a.metrics||[]).slice(-1)[0];
        return `<div class="ranking-row">
          <div class="ranking-num">${i+1}</div>
          <div class="ranking-info">
            <div class="ranking-name">${esc(a.adName)||'Anuncio'}</div>
            <div class="ranking-sub">${esc(a.angle||'')} · <span class="badge ${STATUS_COLOR[a.status]||'gray'}" style="font-size:10px;padding:1px 6px">${a.status}</span></div>
          </div>
          ${roasBadge(m?.roas)}
          ${cpaBadge(m?.cpa)}
        </div>`;
      }).join('')}
  `;

  const hasLocal=localStorage.getItem('kiriz_ads');
  document.getElementById('dash-import').innerHTML=hasLocal?`
    <div class="card">
      <div class="section-label">Datos locales detectados</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:12px">Tenés datos guardados en este navegador del panel anterior. Podés importarlos a la nube ahora.</p>
      <button class="btn primary" onclick="importLocal()">Importar datos locales a la nube</button>
    </div>
  `:'';
}

// ── IMPORT LOCAL ──────────────────────────────────────────────────────────
async function importLocal(){
  try{
    const localAds=JSON.parse(localStorage.getItem('kiriz_ads')||'[]');
    const localScripts=JSON.parse(localStorage.getItem('kiriz_scripts')||'[]');
    let count=0;
    for(const a of localAds){
      if(!ads.find(x=>x.id===a.id)){
        await saveAd(a);ads.push(a);count++;
      }
    }
    for(const s of localScripts){
      if(!scripts.find(x=>x.id===s.id)){
        await saveScript(s);scripts.push(s);count++;
      }
    }
    toast(`${count} registros importados a la nube`);
    renderDashboard();renderAdList();renderScriptList();
  }catch(e){toast('Error al importar: '+e.message,3000);}
}

function renderTagFilters(){
  document.getElementById('tag-filters').innerHTML=TAG_OPTS.map(t=>`
    <button class="tag-pill ${activeTagFilter===t?'active':''}" onclick="setTagFilter('${t}')">${t}</button>
  `).join(' ');
}

function setTagFilter(t){
  activeTagFilter=activeTagFilter===t?'':t;
  renderTagFilters();renderAdList();
}

function renderAdList(){
  renderTagFilters();
  const q=(document.getElementById('search-input')?.value||'').toLowerCase();
  const fStatus=document.getElementById('filter-status')?.value||'';
  const fStage=document.getElementById('filter-stage')?.value||'';
  const filtered=ads.filter(a=>{
    const matchQ=!q||[a.adName,a.adsetName,a.campaignName,a.angle].join(' ').toLowerCase().includes(q);
    const matchS=!fStatus||a.status===fStatus;
    const matchSt=!fStage||a.stage===fStage;
    const matchTag=!activeTagFilter||(a.tags||[]).includes(activeTagFilter);
    return matchQ&&matchS&&matchSt&&matchTag;
  });

  const grid=document.getElementById('ad-grid');
  if(!grid)return;
  if(filtered.length===0){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📋</div>
      <p>${ads.length===0?'Sin anuncios todavía.':'Sin resultados para ese filtro.'}</p>
      ${ads.length===0?`<p><a onclick="addAd()">Crear el primero →</a></p>`:''}
    </div>`;return;
  }
  grid.innerHTML=filtered.map(a=>renderAdCard(a)).join('');
}

function newAd(){
  return {id:uid(),campaignName:'',adsetName:'',adName:'',angle:'',format:'',stage:'',
    status:'Activo',budgetPerDay:'',startDate:now(),headline:'',bodyText:'',
    cta:'',description:'',hookVisual:'',guion:'',notes:'',tags:[],metrics:[]};
}

async function addAd(){
  const a=newAd();
  ads.unshift(a);
  await saveAd(a);
  showPage('ads');
  openAd(a.id);
  toast('Anuncio creado');
}

async function removeAd(id){
  confirm2('Eliminar anuncio','Se elimina el anuncio y todas sus métricas. No se puede deshacer.',async()=>{
    ads=ads.filter(a=>a.id!==id);
    await deleteAdDB(id);
    if(selectedAdId===id){selectedAdId=null;showAdList();}
    renderAdList();renderDashboard();
    toast('Anuncio eliminado');
  });
}

let saveTimeout=null;
function updateAd(field,val){
  const a=ads.find(x=>x.id===selectedAdId);
  if(!a)return;
  a[field]=val;
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(()=>saveAd(a),800);
  if(field==='status'){
    const bCls=STATUS_COLOR[a.status]||'gray';
    document.querySelector('.detail-header .badge').className=`badge ${bCls}`;
    document.querySelector('.detail-header .badge').textContent=a.status;
  }
}

function toggleTag(t){
  const a=ads.find(x=>x.id===selectedAdId);
  if(!a)return;
  if(!a.tags)a.tags=[];
  const idx=a.tags.indexOf(t);
  if(idx>=0)a.tags.splice(idx,1);else a.tags.push(t);
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(()=>saveAd(a),800);
  const btn=event.target;
  btn.classList.toggle('active',a.tags.includes(t));
}

      <div class="field sm"><label>Checkout</label><input value="${esc(m.ic||'')}" placeholder="0" oninput="updateMetric(${idx},'ic',this.value)"/></div>
      <div class="field sm"><label>Video P25</label><input value="${esc(m.p25||'')}" placeholder="0" oninput="updateMetric(${idx},'p25',this.value)"/></div>
      <div class="field sm"><label>Video P75</label><input value="${esc(m.p75||'')}" placeholder="0" oninput="updateMetric(${idx},'p75',this.value)"/></div>
      <div class="field sm"><label>Video P100</label><input value="${esc(m.p100||'')}" placeholder="0" oninput="updateMetric(${idx},'p100',this.value)"/></div>
    </div>
    <div class="form-row">
      <div class="field wide"><label>Notas de esta medición</label><textarea rows="2" placeholder="Observaciones, contexto, acciones tomadas..." oninput="updateMetric(${idx},'notes',this.value)">${esc(m.notes||'')}</textarea></div>
    </div>
  </div>`;
}

async function addMetric(){
  const a=ads.find(x=>x.id===selectedAdId);
  if(!a)return;
  const m={id:uid(),date:now(),time:nowTime(),spend:'',impressions:'',reach:'',ctr:'',cpc:'',cpm:'',
    frequency:'',purchases:'',roas:'',cpa:'',p25:'',p75:'',p100:'',atc:'',ic:'',notes:''};
  if(!a.metrics)a.metrics=[];
  a.metrics.push(m);
  await saveAd(a);
  const container=document.getElementById('metrics-container');
  if(container){
    if(a.metrics.length===1)container.innerHTML='';
    container.insertAdjacentHTML('beforeend',renderMetricBlock(m,a.metrics.length-1));
    setTimeout(()=>{
      const blocks=container.querySelectorAll('.metric-block');
      if(blocks.length)blocks[blocks.length-1].scrollIntoView({behavior:'smooth',block:'start'});
    },100);
  }
  toast('Medición agregada — completá los datos');
}

function updateMetric(idx,field,val){
  const a=ads.find(x=>x.id===selectedAdId);
  if(!a||!a.metrics[idx])return;
  a.metrics[idx][field]=val;
  if(field==='roas'){const el=document.getElementById('mroas-'+idx);if(el)el.innerHTML=roasBadge(val);}
  if(field==='cpa'){const el=document.getElementById('mcpa-'+idx);if(el)el.innerHTML=cpaBadge(val);}
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(()=>saveAd(a),800);
}

async function removeMetric(idx){
  confirm2('Eliminar medición','¿Eliminar esta medición? No se puede deshacer.',async()=>{
    const a=ads.find(x=>x.id===selectedAdId);
    if(!a)return;
    a.metrics.splice(idx,1);
    await saveAd(a);
    renderAdDetail();
    toast('Medición eliminada');
  });
}

// ── SCRIPTS ───────────────────────────────────────────────────────────────
function newScript(){
  return {id:uid(),name:'',angle:'',format:'',product:'Campera Eme',
    hook:'',development:'',cta:'',bodyText:'',notes:'',status:'Borrador',createdAt:now()};
}

async function addScript(){
  const s=newScript();
  scripts.unshift(s);
  await saveScript(s);
  showPage('scripts');
  openScript(s.id);
  toast('Guion creado');
}

async function removeScript(id){
  confirm2('Eliminar guion','¿Eliminar este guion? No se puede deshacer.',async()=>{
    scripts=scripts.filter(s=>s.id!==id);
    await deleteScriptDB(id);
    if(selectedScriptId===id){selectedScriptId=null;showScriptList();}
    renderScriptList();
    toast('Guion eliminado');
  });
}

function renderScriptList(){
  const grid=document.getElementById('script-grid');
  if(!grid)return;
  if(scripts.length===0){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">✍️</div><p>Sin guiones todavía.</p><p><a onclick="addScript()">Crear el primero →</a></p></div>`;
    return;
  }
  const sCls={Aprobado:'green',Borrador:'amber','En uso':'blue',Archivado:'gray'};
  grid.innerHTML=scripts.map(s=>`<div class="card clickable" onclick="openScript('${s.id}')">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
      <div style="font-size:13px;font-weight:500">${esc(s.name)||'Guion sin nombre'}</div>
      <span class="badge ${sCls[s.status]||'gray'}">${s.status}</span>
    </div>
    <div class="ad-card-tags">
      ${s.angle?`<span class="badge purple">${esc(s.angle)}</span>`:''}
      ${s.product?`<span class="badge teal">${esc(s.product)}</span>`:''}
      ${s.format?`<span class="badge gray">${esc(s.format)}</span>`:''}
    </div>
    ${s.hook?`<div style="font-size:12px;color:var(--text2);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:8px">Hook: ${esc(s.hook)}</div>`:''}
    <div class="ad-card-actions">
      <button class="btn sm" onclick="event.stopPropagation();openScript('${s.id}')">Editar</button>
      <button class="btn sm danger" onclick="event.stopPropagation();removeScript('${s.id}')">Eliminar</button>
    </div>
  </div>`).join('');
}

function showScriptList(){
  document.getElementById('scripts-list-view').style.display='block';
  document.getElementById('scripts-detail-view').style.display='none';
  selectedScriptId=null;renderScriptList();
}

function openScript(id){
  selectedScriptId=id;
  document.getElementById('scripts-list-view').style.display='none';
  document.getElementById('scripts-detail-view').style.display='block';
  renderScriptDetail();
}

function renderScriptDetail(){
  const s=scripts.find(x=>x.id===selectedScriptId);
  if(!s){showScriptList();return;}
  const angOpts=ANGLE_OPTS.map(o=>`<option ${s.angle===o?'selected':''}>${o}</option>`).join('');
  const fmtOpts=FORMAT_OPTS.map(o=>`<option ${s.format===o?'selected':''}>${o}</option>`).join('');
  const stOpts=['Borrador','Aprobado','En uso','Archivado'].map(o=>`<option ${s.status===o?'selected':''}>${o}</option>`).join('');

  document.getElementById('scripts-detail-view').innerHTML=`
    <button class="back-btn" onclick="showScriptList()">← Volver a guiones</button>
    <div class="detail-title" style="margin-bottom:20px">${esc(s.name)||'Guion sin nombre'}</div>
    <div class="form-block">
      <div class="section-label">Identificación</div>
      <div class="form-row">
        <div class="field wide"><label>Nombre del guion</label><input value="${esc(s.name)}" placeholder="Ej: Prueba Social v2 — Campera Eme" oninput="updateScript('name',this.value)"/></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Ángulo</label><select onchange="updateScript('angle',this.value)"><option value="">Seleccionar...</option>${angOpts}</select></div>
        <div class="field"><label>Formato</label><select onchange="updateScript('format',this.value)"><option value="">Seleccionar...</option>${fmtOpts}</select></div>
        <div class="field"><label>Producto</label><input value="${esc(s.product)}" placeholder="Ej: Campera Eme" oninput="updateScript('product',this.value)"/></div>
        <div class="field"><label>Estado</label><select onchange="updateScript('status',this.value)">${stOpts}</select></div>
        <div class="field sm"><label>Fecha</label><input type="date" value="${esc(s.createdAt)}" oninput="updateScript('createdAt',this.value)"/></div>
      </div>
    </div>
    <div class="form-block">
      <div class="section-label">Guion</div>
      <div class="form-row">
        <div class="field wide"><label>Hook visual (primeros 2-3 seg)</label><textarea rows="2" placeholder="Qué se ve en pantalla los primeros segundos..." oninput="updateScript('hook',this.value)">${esc(s.hook)}</textarea></div>
        <div class="field wide"><label>Desarrollo completo</label><textarea rows="6" placeholder="El guion con todas las escenas, texto, transiciones..." oninput="updateScript('development',this.value)">${esc(s.development)}</textarea></div>
        <div class="field wide"><label>CTA final</label><textarea rows="2" placeholder="Qué dice o aparece al final..." oninput="updateScript('cta',this.value)">${esc(s.cta)}</textarea></div>
      </div>
    </div>
    <div class="form-block">
      <div class="section-label">Copy del anuncio</div>
      <div class="form-row">
        <div class="field wide"><label>Texto principal (feed)</label><textarea rows="4" placeholder="El copy que va en el feed..." oninput="updateScript('bodyText',this.value)">${esc(s.bodyText)}</textarea></div>
        <div class="field wide"><label>Notas</label><textarea rows="2" placeholder="Versiones, resultados, ideas..." oninput="updateScript('notes',this.value)">${esc(s.notes)}</textarea></div>
      </div>
    </div>
  `;
}

let saveScriptTimeout=null;
function updateScript(field,val){
  const s=scripts.find(x=>x.id===selectedScriptId);
  if(!s)return;
  s[field]=val;
  clearTimeout(saveScriptTimeout);
  saveScriptTimeout=setTimeout(()=>saveScript(s),800);
}
</script>
</body>
</html>
