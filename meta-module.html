<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meta Ads Live — Lado T OS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f9f8f6;--surface:#fff;--surface2:#f1efe8;--border:#d3d1c7;--border2:#b4b2a9;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#b4b2a9;
  --blue:#185fa5;--blue-bg:#e6f1fb;--blue-dark:#0c447c;
  --green:#3b6d11;--green-bg:#eaf3de;
  --amber:#854f0b;--amber-bg:#faeeda;
  --red:#a32d2d;--red-bg:#fcebeb;
  --purple:#3c3489;--purple-bg:#eeedfe;
  --teal:#0f6e56;--teal-bg:#e1f5ee;
  --r:8px;--rl:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:24px 20px 60px}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.header-left h1{font-size:22px;font-weight:600;letter-spacing:-0.02em;margin-bottom:3px}
.header-left p{font-size:13px;color:var(--text2)}
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;padding:8px 18px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-weight:400;transition:all .15s;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:500}
.btn.primary:hover{background:var(--blue-dark)}
.btn.success{background:var(--green);color:#fff;border-color:var(--green)}
.btn.danger{color:var(--red);border-color:#f7c1c1}
.btn.sm{font-size:11px;padding:4px 12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px}
.badge.green{background:var(--green-bg);color:var(--green)}
.badge.amber{background:var(--amber-bg);color:var(--amber)}
.badge.red{background:var(--red-bg);color:var(--red)}
.badge.blue{background:var(--blue-bg);color:var(--blue)}
.badge.purple{background:var(--purple-bg);color:var(--purple)}
.badge.gray{background:var(--surface2);color:var(--text2)}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:14px}
.section-label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px}
.divider{height:0.5px;background:var(--border);margin:20px 0}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface2);border-radius:var(--r);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:4px}
.stat-value{font-size:22px;font-weight:500}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}
.stat-delta{font-size:11px;margin-top:3px;font-weight:500}
.stat-delta.up{color:var(--green)}
.stat-delta.down{color:var(--red)}
.tab-row{display:flex;gap:4px;border-bottom:0.5px solid var(--border);margin-bottom:20px}
.tab-btn{font-size:13px;padding:8px 16px;border:none;background:transparent;cursor:pointer;color:var(--text2);font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:all .15s}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;font-weight:500;color:var(--text2);text-align:left;padding:8px 10px;border-bottom:0.5px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--text)}
td{padding:9px 10px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.trend-up{color:var(--green);font-weight:500}
.trend-down{color:var(--red);font-weight:500}
.trend-neutral{color:var(--text3)}
.alert-box{border-radius:var(--rl);padding:12px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;font-size:13px;line-height:1.5}
.alert-box.red{background:var(--red-bg);border-left:3px solid var(--red)}
.alert-box.amber{background:var(--amber-bg);border-left:3px solid var(--amber)}
.alert-box.green{background:var(--green-bg);border-left:3px solid var(--green)}
.alert-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.alert-body strong{font-weight:500;color:var(--text);display:block;margin-bottom:2px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-row select,.filter-row input{border:0.5px solid var(--border);border-radius:var(--r);padding:7px 12px;font-size:13px;background:transparent;color:var(--text);outline:none;font-family:inherit}
.loading{display:flex;align-items:center;gap:10px;padding:32px;color:var(--text2);font-size:13px}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:32px;margin-bottom:12px}
.setup-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:28px;max-width:520px;margin:0 auto}
.setup-card h2{font-size:18px;font-weight:500;margin-bottom:8px}
.setup-card p{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.field label{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:0.05em}
.field input{border:0.5px solid var(--border);border-radius:var(--r);padding:9px 12px;font-size:13px;background:transparent;color:var(--text);outline:none;font-family:inherit}
.field input:focus{border-color:var(--blue)}
.snapshot-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:12px}
.snapshot-row:last-child{border-bottom:none}
.period-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s}
.period-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-box{background:var(--surface);border-radius:var(--rl);padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:500;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.account-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border);font-size:12px;cursor:pointer;transition:all .15s;background:transparent;color:var(--text2);font-family:inherit}
.account-pill.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.roas-bar{height:6px;border-radius:3px;background:var(--surface2);overflow:hidden;min-width:60px}
.roas-fill{height:100%;border-radius:3px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <h1>Meta Ads — Live</h1>
      <p id="last-update-text">Conectá tu cuenta para ver los datos en tiempo real</p>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <div id="account-pills"></div>
      <button class="btn" onclick="openAddAccount()" id="btn-add-account">+ Cuenta</button>
      <button class="btn primary" onclick="fetchData(true)" id="btn-refresh" disabled>↻ Actualizar</button>
      <button class="btn success" onclick="saveSnapshot()" id="btn-snapshot" disabled>📸 Guardar snapshot</button>
    </div>
  </div>

  <div id="alerts-container"></div>

  <div id="main-content">
    <div style="display:flex;align-items:center;justify-content:center;min-height:300px">
      <div class="setup-card">
        <div style="font-size:32px;margin-bottom:12px">🔗</div>
        <h2>Conectá tu cuenta de Meta Ads</h2>
        <p>Vinculá tu cuenta publicitaria para ver métricas en tiempo real, detectar alertas y guardar snapshots históricos.</p>
        <button class="btn primary" style="width:100%" onclick="openAddAccount()">Conectar cuenta →</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="modal-container"></div>

<script>
const SUPA_URL='https://vluoynizpvckjqomojxx.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsdW95bml6cHZja2pxb21vanh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMzE4MTQsImV4cCI6MjA5NjYwNzgxNH0.ItNRCYNzKYvs_S_ToOSOwKesRGZvniq0-kFNKcqZFPM';
const APP_ID='1003982038687663';
const{createClient}=supabase;
const db=createClient(SUPA_URL,SUPA_KEY);

const BREAKEVEN_ROAS=2.5;
const TARGET_ROAS=3.5;
const BREAKEVEN_CPA=18.33;
const ALERT_THRESHOLDS={roas_drop:0.20,cpa_max:BREAKEVEN_CPA,freq_max:3.5,ctr_drop:0.30};

let currentUser=null;
let connections=[];
let activeAccountId=null;
let activeConnection=null;
let liveData={campaigns:[],adsets:[],ads:[]};
let prevData={campaigns:[],adsets:[],ads:[]};
let snapshots=[];
let activeTab='campaigns';
let activePeriod='today';
let sortCol='spend';
let sortDir=-1;
let autoRefreshInterval=null;

function toast(msg,dur=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur)}
function closeModal(){document.getElementById('modal-container').innerHTML=''}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmt(n,prefix='',suffix='',decimals=2){if(n===null||n===undefined||n==='')return'—';const v=parseFloat(n);if(isNaN(v))return'—';return prefix+v.toFixed(decimals)+suffix}
function fmtInt(n){if(!n&&n!==0)return'—';return parseInt(n).toLocaleString('es-AR')}
function now(){return new Date().toISOString()}

// ── AUTH ──────────────────────────────────────────────────────────────────
async function init(){
  const{data:{session}}=await db.auth.getSession();
  if(!session){
    // redirect to login if no session
    document.getElementById('main-content').innerHTML=`<div class="empty"><div class="empty-icon">🔒</div><p style="font-size:14px">Tenés que iniciar sesión desde el sistema principal.</p><p style="margin-top:8px"><a href="lado-t-os-v2.html" style="color:var(--blue)">Ir al sistema →</a></p></div>`;
    return;
  }
  currentUser=session.user;
  await loadConnections();
  await loadSnapshots();
  if(connections.length>0){
    activeAccountId=connections[0].account_id;
    activeConnection=connections[0];
    renderAccountPills();
    enableButtons();
    await fetchData(false);
    startAutoRefresh();
  } else {
    renderAccountPills();
  }
}

async function loadConnections(){
  const{data}=await db.from('meta_connections').select('*').eq('user_id',currentUser.id);
  connections=data||[];
}

async function loadSnapshots(){
  const{data}=await db.from('meta_snapshots').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false}).limit(50);
  snapshots=data||[];
}

function enableButtons(){
  document.getElementById('btn-refresh').disabled=false;
  document.getElementById('btn-snapshot').disabled=false;
}

function startAutoRefresh(){
  if(autoRefreshInterval)clearInterval(autoRefreshInterval);
  autoRefreshInterval=setInterval(()=>fetchData(false),3600000); // 1hr
}

function renderAccountPills(){
  document.getElementById('account-pills').innerHTML=connections.map(c=>`
    <button class="account-pill ${c.account_id===activeAccountId?'active':''}" onclick="switchAccount('${c.account_id}')">
      ${esc(c.account_name||c.account_id)}
    </button>
  `).join('');
}

function switchAccount(id){
  activeAccountId=id;
  activeConnection=connections.find(c=>c.account_id===id);
  renderAccountPills();
  fetchData(true);
}

// ── META API ──────────────────────────────────────────────────────────────
function getPeriodDates(){
  const today=new Date();
  const fmt=d=>d.toISOString().slice(0,10);
  if(activePeriod==='today')return{since:fmt(today),until:fmt(today)};
  if(activePeriod==='yesterday'){const y=new Date(today);y.setDate(y.getDate()-1);return{since:fmt(y),until:fmt(y)}}
  if(activePeriod==='last_7d'){const s=new Date(today);s.setDate(s.getDate()-6);return{since:fmt(s),until:fmt(today)}}
  if(activePeriod==='last_30d'){const s=new Date(today);s.setDate(s.getDate()-29);return{since:fmt(s),until:fmt(today)}}
  if(activePeriod==='this_month'){const s=new Date(today.getFullYear(),today.getMonth(),1);return{since:fmt(s),until:fmt(today)}}
  return{since:fmt(today),until:fmt(today)};
}

const FIELDS='impressions,reach,frequency,spend,clicks,inline_link_clicks,ctr,cpm,cost_per_inline_link_click,actions,action_values,cost_per_action_type,video_p25_watched_actions,video_p75_watched_actions,video_p100_watched_actions,video_thruplay_watched_actions';

async function metaFetch(endpoint){
  if(!activeConnection)return null;
  const token=activeConnection.token;
  const url=`https://graph.facebook.com/v19.0/${endpoint}&access_token=${token}`;
  const res=await fetch(url);
  const json=await res.json();
  if(json.error){console.error('Meta API error:',json.error);return null}
  return json;
}

function extractAction(actions,type){
  if(!actions||!Array.isArray(actions))return 0;
  const a=actions.find(x=>x.action_type===type);
  return a?parseFloat(a.value)||0:0;
}

function extractActionValue(action_values,type){
  if(!action_values||!Array.isArray(action_values))return 0;
  const a=action_values.find(x=>x.action_type===type);
  return a?parseFloat(a.value)||0:0;
}

function extractVideo(arr){
  if(!arr||!Array.isArray(arr))return 0;
  return arr.reduce((s,x)=>s+(parseFloat(x.value)||0),0);
}

function processInsight(i,name,id,status){
  const purchases=extractAction(i.actions,'purchase')||extractAction(i.actions,'offsite_conversion.fb_pixel_purchase');
  const purchaseValue=extractActionValue(i.action_values,'purchase')||extractActionValue(i.action_values,'offsite_conversion.fb_pixel_purchase');
  const atc=extractAction(i.actions,'add_to_cart')||extractAction(i.actions,'offsite_conversion.fb_pixel_add_to_cart');
  const ic=extractAction(i.actions,'initiate_checkout')||extractAction(i.actions,'offsite_conversion.fb_pixel_initiate_checkout');
  const spend=parseFloat(i.spend)||0;
  const roas=spend>0&&purchaseValue>0?purchaseValue/spend:0;
  const cpa=purchases>0?spend/purchases:0;
  return{
    id,name,status:status||'ACTIVE',
    spend,impressions:parseInt(i.impressions)||0,reach:parseInt(i.reach)||0,
    frequency:parseFloat(i.frequency)||0,
    clicks:parseInt(i.clicks)||0,
    link_clicks:parseInt(i.inline_link_clicks)||0,
    ctr:parseFloat(i.ctr)||0,
    cpm:parseFloat(i.cpm)||0,
    cpc:parseFloat(i.cost_per_inline_link_click)||0,
    purchases,purchase_value:purchaseValue,
    atc,ic,roas,cpa,
    p25:extractVideo(i.video_p25_watched_actions),
    p75:extractVideo(i.video_p75_watched_actions),
    p100:extractVideo(i.video_p100_watched_actions),
  };
}

async function fetchData(showToast=true){
  if(!activeConnection){toast('Conectá una cuenta primero',2000);return}
  const btn=document.getElementById('btn-refresh');
  btn.disabled=true;btn.textContent='↻ Cargando...';
  showLoadingState();

  try{
    const{since,until}=getPeriodDates();
    const timeRange=encodeURIComponent(JSON.stringify({since,until}));
    const acctId=activeAccountId.replace('act_','');
    const acctIdFull=activeAccountId.startsWith('act_')?activeAccountId:`act_${activeAccountId}`;

    // Store previous data for comparison
    prevData={campaigns:[...liveData.campaigns],adsets:[...liveData.adsets],ads:[...liveData.ads]};

    // Fetch campaigns
    const campRes=await metaFetch(`${acctIdFull}/campaigns?fields=id,name,status,objective,daily_budget,lifetime_budget&insights.fields(${FIELDS})&insights.time_range=${timeRange}&limit=50`);
    
    // Fetch adsets
    const adsetRes=await metaFetch(`${acctIdFull}/adsets?fields=id,name,status,campaign_id,daily_budget,bid_strategy&insights.fields(${FIELDS})&insights.time_range=${timeRange}&limit=100`);
    
    // Fetch ads
    const adRes=await metaFetch(`${acctIdFull}/ads?fields=id,name,status,adset_id,campaign_id&insights.fields(${FIELDS})&insights.time_range=${timeRange}&limit=200`);

    if(campRes){
      liveData.campaigns=(campRes.data||[]).map(c=>{
        const i=c.insights?.data?.[0]||{};
        return processInsight(i,c.name,c.id,c.status);
      });
    }

    if(adsetRes){
      liveData.adsets=(adsetRes.data||[]).map(a=>{
        const i=a.insights?.data?.[0]||{};
        const obj=processInsight(i,a.name,a.id,a.status);
        obj.campaign_id=a.campaign_id;
        obj.daily_budget=a.daily_budget;
        return obj;
      });
    }

    if(adRes){
      liveData.ads=(adRes.data||[]).map(a=>{
        const i=a.insights?.data?.[0]||{};
        const obj=processInsight(i,a.name,a.id,a.status);
        obj.adset_id=a.adset_id;
        obj.campaign_id=a.campaign_id;
        return obj;
      });
    }

    const now=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('last-update-text').textContent=`Última actualización: ${now} · Período: ${getPeriodLabel()} · Próxima auto-actualización en 1h`;

    renderAlerts();
    renderMainContent();
    if(showToast)toast('Datos actualizados ✓');

  }catch(e){
    console.error(e);
    toast('Error al traer datos: '+e.message,3000);
    renderErrorState(e.message);
  }

  btn.disabled=false;btn.textContent='↻ Actualizar';
}

function getPeriodLabel(){
  const labels={today:'Hoy',yesterday:'Ayer',last_7d:'Últimos 7 días',last_30d:'Últimos 30 días',this_month:'Este mes'};
  return labels[activePeriod]||activePeriod;
}

function setPeriod(p){
  activePeriod=p;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.toggle('active',b.dataset.period===p));
  fetchData(false);
}

// ── ALERTS ────────────────────────────────────────────────────────────────
function renderAlerts(){
  const alerts=[];
  const allEntities=[...liveData.campaigns,...liveData.adsets,...liveData.ads];

  allEntities.forEach(e=>{
    if(!e.spend||e.spend<2)return; // Not enough spend to judge

    // ROAS drop vs previous
    const prev=([...prevData.campaigns,...prevData.adsets,...prevData.ads]).find(x=>x.id===e.id);
    if(prev&&prev.roas>0&&e.roas>0){
      const drop=(prev.roas-e.roas)/prev.roas;
      if(drop>=ALERT_THRESHOLDS.roas_drop){
        alerts.push({type:'red',icon:'📉',title:`ROAS cayó ${Math.round(drop*100)}% — ${esc(e.name)}`,body:`Era ${prev.roas.toFixed(2)}× y ahora está en ${e.roas.toFixed(2)}×. Revisá la frecuencia y el creativo.`});
      }
    }

    // CPA over breakeven
    if(e.cpa>0&&e.cpa>BREAKEVEN_CPA){
      alerts.push({type:'red',icon:'💸',title:`CPA sobre el breakeven — ${esc(e.name)}`,body:`CPA actual: u$s ${e.cpa.toFixed(2)} (breakeven: u$s ${BREAKEVEN_CPA}). Estás perdiendo plata en este ad.`});
    }

    // Frequency too high
    if(e.frequency>ALERT_THRESHOLDS.freq_max){
      alerts.push({type:'amber',icon:'🔁',title:`Frecuencia alta (${e.frequency.toFixed(1)}) — ${esc(e.name)}`,body:`La audiencia está viendo el mismo ad ${e.frequency.toFixed(1)} veces. Riesgo de fatiga — sumá nuevos creativos.`});
    }

    // CTR drop
    if(prev&&prev.ctr>0&&e.ctr>0){
      const drop=(prev.ctr-e.ctr)/prev.ctr;
      if(drop>=ALERT_THRESHOLDS.ctr_drop){
        alerts.push({type:'amber',icon:'👆',title:`CTR cayó ${Math.round(drop*100)}% — ${esc(e.name)}`,body:`El CTR bajó de ${prev.ctr.toFixed(2)}% a ${e.ctr.toFixed(2)}%. El creativo puede estar perdiendo efectividad.`});
      }
    }

    // Winner detection
    if(e.roas>=TARGET_ROAS&&e.purchases>=2&&e.spend>=5){
      alerts.push({type:'green',icon:'🏆',title:`Winner detectado — ${esc(e.name)}`,body:`ROAS ${e.roas.toFixed(2)}× con ${e.purchases} compras y u$s ${e.spend.toFixed(2)} de gasto. Candidato para escalar.`});
    }
  });

  // ROAS explanation helper
  allEntities.forEach(e=>{
    if(e.roas>0&&e.roas<BREAKEVEN_ROAS&&e.spend>5){
      let reasons=[];
      if(e.ctr<0.8)reasons.push('CTR bajo ('+e.ctr.toFixed(2)+'%) — el creativo no engancha');
      if(e.frequency>2.5)reasons.push('Frecuencia alta ('+e.frequency.toFixed(1)+') — audiencia saturada');
      if(e.cpm>6)reasons.push('CPM alto (u$s '+e.cpm.toFixed(2)+') — inventario caro');
      if(reasons.length>0){
        alerts.push({type:'red',icon:'🔍',title:`¿Por qué bajó el ROAS de "${esc(e.name)}"?`,body:reasons.join(' · ')});
      }
    }
  });

  const container=document.getElementById('alerts-container');
  if(alerts.length===0){container.innerHTML='';return}
  container.innerHTML=`
    <div class="card" style="margin-bottom:20px">
      <div class="section-label">Alertas activas (${alerts.length})</div>
      ${alerts.map(a=>`<div class="alert-box ${a.type}">
        <div class="alert-icon">${a.icon}</div>
        <div class="alert-body"><strong>${a.title}</strong>${a.body}</div>
      </div>`).join('')}
    </div>
  `;
}

// ── MAIN CONTENT ──────────────────────────────────────────────────────────
function showLoadingState(){
  document.getElementById('main-content').innerHTML=`<div class="loading"><div class="spinner"></div>Trayendo datos de Meta Ads...</div>`;
}

function renderErrorState(msg){
  document.getElementById('main-content').innerHTML=`
    <div class="card"><div class="empty"><div class="empty-icon">⚠️</div>
      <p style="color:var(--red);font-size:13px">Error al conectar con Meta: ${esc(msg)}</p>
      <p style="margin-top:8px;font-size:12px">Verificá que el token sea válido y que la cuenta tenga los permisos correctos.</p>
      <button class="btn primary" style="margin-top:16px" onclick="fetchData(true)">Reintentar</button>
    </div></div>`;
}

function renderMainContent(){
  const allData=activeTab==='campaigns'?liveData.campaigns:activeTab==='adsets'?liveData.adsets:liveData.ads;
  const totalSpend=allData.reduce((s,x)=>s+x.spend,0);
  const totalPurchases=allData.reduce((s,x)=>s+x.purchases,0);
  const totalValue=allData.reduce((s,x)=>s+x.purchase_value,0);
  const totalRoas=totalSpend>0?totalValue/totalSpend:0;
  const totalCpa=totalPurchases>0?totalSpend/totalPurchases:0;
  const totalImpressions=allData.reduce((s,x)=>s+x.impressions,0);
  const avgCtr=totalImpressions>0?allData.reduce((s,x)=>s+x.impressions*x.ctr,0)/totalImpressions:0;
  const avgCpm=totalImpressions>0?allData.reduce((s,x)=>s+x.impressions*x.cpm,0)/totalImpressions:0;
  const avgFreq=allData.length>0?allData.reduce((s,x)=>s+x.frequency,0)/allData.filter(x=>x.frequency>0).length||0:0;

  const roasColor=totalRoas>=TARGET_ROAS?'var(--green)':totalRoas>=BREAKEVEN_ROAS?'var(--amber)':'var(--red)';
  const cpaColor=totalCpa>0?(totalCpa<=12?'var(--green)':totalCpa<=BREAKEVEN_CPA?'var(--amber)':'var(--red)'):'var(--text)';

  document.getElementById('main-content').innerHTML=`
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
      ${['today','yesterday','last_7d','last_30d','this_month'].map(p=>`
        <button class="period-btn ${activePeriod===p?'active':''}" data-period="${p}" onclick="setPeriod('${p}')">
          ${{today:'Hoy',yesterday:'Ayer',last_7d:'7 días',last_30d:'30 días',this_month:'Este mes'}[p]}
        </button>`).join('')}
    </div>

    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Gasto total</div><div class="stat-value">u$s ${totalSpend.toFixed(2)}</div><div class="stat-sub">${getPeriodLabel()}</div></div>
      <div class="stat-card"><div class="stat-label">ROAS</div><div class="stat-value" style="color:${roasColor}">${totalRoas>0?totalRoas.toFixed(2)+'×':'—'}</div><div class="stat-sub">breakeven ${BREAKEVEN_ROAS}×</div></div>
      <div class="stat-card"><div class="stat-label">Compras</div><div class="stat-value">${fmtInt(totalPurchases)}</div><div class="stat-sub">u$s ${totalValue.toFixed(2)} en ventas</div></div>
      <div class="stat-card"><div class="stat-label">CPA</div><div class="stat-value" style="color:${cpaColor}">${totalCpa>0?'u$s '+totalCpa.toFixed(2):'—'}</div><div class="stat-sub">máx rentable u$s ${BREAKEVEN_CPA}</div></div>
      <div class="stat-card"><div class="stat-label">CTR promedio</div><div class="stat-value" style="color:${avgCtr>=1.5?'var(--green)':avgCtr>=0.8?'var(--amber)':'var(--red)'}">${avgCtr>0?avgCtr.toFixed(2)+'%':'—'}</div><div class="stat-sub">bueno > 1.5%</div></div>
      <div class="stat-card"><div class="stat-label">CPM promedio</div><div class="stat-value" style="color:${avgCpm<=3?'var(--green)':avgCpm<=6?'var(--amber)':'var(--red)'}">${avgCpm>0?'u$s '+avgCpm.toFixed(2):'—'}</div><div class="stat-sub">bueno < u$s 3</div></div>
      <div class="stat-card"><div class="stat-label">Frecuencia</div><div class="stat-value" style="color:${avgFreq<=2.5?'var(--green)':avgFreq<=3.5?'var(--amber)':'var(--red)'}">${avgFreq>0?avgFreq.toFixed(2):'—'}</div><div class="stat-sub">máx saludable 2.5</div></div>
      <div class="stat-card"><div class="stat-label">Impresiones</div><div class="stat-value">${totalImpressions>0?fmtInt(totalImpressions):'—'}</div><div class="stat-sub">total período</div></div>
    </div>

    <div class="tab-row">
      <button class="tab-btn ${activeTab==='campaigns'?'active':''}" onclick="setTab('campaigns')">Campañas (${liveData.campaigns.length})</button>
      <button class="tab-btn ${activeTab==='adsets'?'active':''}" onclick="setTab('adsets')">Conjuntos (${liveData.adsets.length})</button>
      <button class="tab-btn ${activeTab==='ads'?'active':''}" onclick="setTab('ads')">Anuncios (${liveData.ads.length})</button>
      <button class="tab-btn ${activeTab==='snapshots'?'active':''}" onclick="setTab('snapshots')">Historial (${snapshots.length})</button>
    </div>

    <div id="tab-content">
      ${renderTabContent()}
    </div>
  `;
}

function setTab(t){activeTab=t;document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['campaigns','adsets','ads','snapshots'][i]===t));document.getElementById('tab-content').innerHTML=renderTabContent()}

function renderTabContent(){
  if(activeTab==='snapshots')return renderSnapshots();
  const data=activeTab==='campaigns'?liveData.campaigns:activeTab==='adsets'?liveData.adsets:liveData.ads;
  if(data.length===0)return`<div class="empty"><div class="empty-icon">📊</div><p>Sin datos para este período.</p></div>`;
  const sorted=[...data].sort((a,b)=>b[sortCol]!==undefined?(b[sortCol]-a[sortCol])*sortDir:0);
  const showVideo=activeTab==='ads';

  return`<div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('name')" style="min-width:200px">Nombre ${sortCol==='name'?'↕':''}</th>
          <th onclick="sortBy('status')">Estado</th>
          <th onclick="sortBy('spend')">Gasto ${sortCol==='spend'?'↕':''}</th>
          <th onclick="sortBy('roas')">ROAS ${sortCol==='roas'?'↕':''}</th>
          <th onclick="sortBy('cpa')">CPA ${sortCol==='cpa'?'↕':''}</th>
          <th onclick="sortBy('purchases')">Compras ${sortCol==='purchases'?'↕':''}</th>
          <th onclick="sortBy('ctr')">CTR ${sortCol==='ctr'?'↕':''}</th>
          <th onclick="sortBy('cpm')">CPM ${sortCol==='cpm'?'↕':''}</th>
          <th onclick="sortBy('cpc')">CPC ${sortCol==='cpc'?'↕':''}</th>
          <th onclick="sortBy('frequency')">Frec. ${sortCol==='frequency'?'↕':''}</th>
          <th onclick="sortBy('impressions')">Impr. ${sortCol==='impressions'?'↕':''}</th>
          <th onclick="sortBy('reach')">Alcance ${sortCol==='reach'?'↕':''}</th>
          <th onclick="sortBy('atc')">ATC ${sortCol==='atc'?'↕':''}</th>
          <th onclick="sortBy('ic')">IC ${sortCol==='ic'?'↕':''}</th>
          ${showVideo?`<th onclick="sortBy('p25')">P25</th><th onclick="sortBy('p75')">P75</th><th onclick="sortBy('p100')">P100</th>`:''}
        </tr>
      </thead>
      <tbody>
        ${sorted.map(e=>renderRow(e,showVideo)).join('')}
      </tbody>
    </table>
  </div>`;
}

function sortBy(col){if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=-1}document.getElementById('tab-content').innerHTML=renderTabContent()}

function renderRow(e,showVideo){
  const roasCls=e.roas>=TARGET_ROAS?'trend-up':e.roas>=BREAKEVEN_ROAS?'':e.roas>0?'trend-down':'trend-neutral';
  const cpaCls=e.cpa>0?(e.cpa<=12?'trend-up':e.cpa<=BREAKEVEN_CPA?'':'trend-down'):'trend-neutral';
  const ctrCls=e.ctr>=1.5?'trend-up':e.ctr>=0.8?'':'trend-down';
  const freqCls=e.frequency<=2.5?'':e.frequency<=3.5?'':'trend-down';
  const statusBadge={ACTIVE:'green',PAUSED:'amber',DELETED:'red',ARCHIVED:'gray'}[e.status]||'gray';
  const roasPct=Math.min(100,e.roas/6*100);
  const roasBarColor=e.roas>=TARGET_ROAS?'var(--green)':e.roas>=BREAKEVEN_ROAS?'var(--amber)':'var(--red)';

  return`<tr>
    <td style="font-weight:500;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(e.name)}">${esc(e.name)}</td>
    <td><span class="badge ${statusBadge}">${e.status}</span></td>
    <td>u$s ${e.spend.toFixed(2)}</td>
    <td>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="${roasCls}">${e.roas>0?e.roas.toFixed(2)+'×':'—'}</span>
        ${e.roas>0?`<div class="roas-bar"><div class="roas-fill" style="width:${roasPct}%;background:${roasBarColor}"></div></div>`:''}
      </div>
    </td>
    <td class="${cpaCls}">${e.cpa>0?'u$s '+e.cpa.toFixed(2):'—'}</td>
    <td>${e.purchases>0?e.purchases:'—'}</td>
    <td class="${ctrCls}">${e.ctr>0?e.ctr.toFixed(2)+'%':'—'}</td>
    <td>${e.cpm>0?'u$s '+e.cpm.toFixed(2):'—'}</td>
    <td>${e.cpc>0?'u$s '+e.cpc.toFixed(2):'—'}</td>
    <td class="${freqCls}">${e.frequency>0?e.frequency.toFixed(2):'—'}</td>
    <td>${e.impressions>0?fmtInt(e.impressions):'—'}</td>
    <td>${e.reach>0?fmtInt(e.reach):'—'}</td>
    <td>${e.atc>0?e.atc:'—'}</td>
    <td>${e.ic>0?e.ic:'—'}</td>
    ${showVideo?`<td>${e.p25>0?fmtInt(e.p25):'—'}</td><td>${e.p75>0?fmtInt(e.p75):'—'}</td><td>${e.p100>0?fmtInt(e.p100):'—'}</td>`:''}
  </tr>`;
}

function renderSnapshots(){
  if(snapshots.length===0)return`<div class="empty"><p>Sin snapshots todavía. Apretá "Guardar snapshot" para guardar las métricas actuales.</p></div>`;
  return`<div class="card">
    ${snapshots.map(s=>{
      const d=s.data;
      const dt=new Date(s.created_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
      return`<div class="snapshot-row">
        <div style="flex:1"><strong style="font-size:13px">${dt}</strong> <span style="color:var(--text3);font-size:11px">· ${s.level} · ${s.date_start} → ${s.date_stop}</span></div>
        ${d.total_roas?`<span class="badge ${d.total_roas>=TARGET_ROAS?'green':d.total_roas>=BREAKEVEN_ROAS?'amber':'red'}">${parseFloat(d.total_roas).toFixed(2)}×</span>`:''}
        ${d.total_spend?`<span style="font-size:12px;color:var(--text2)">u$s ${parseFloat(d.total_spend).toFixed(2)}</span>`:''}
        ${d.total_purchases?`<span style="font-size:12px;color:var(--text2)">${d.total_purchases} compras</span>`:''}
        <button class="btn sm danger" onclick="deleteSnapshot('${s.id}')">×</button>
      </div>`;
    }).join('')}
  </div>`;
}

async function saveSnapshot(){
  if(!activeConnection){toast('Conectá una cuenta primero',2000);return}
  const{since,until}=getPeriodDates();
  const data=activeTab==='campaigns'?liveData.campaigns:activeTab==='adsets'?liveData.adsets:liveData.ads;
  const totalSpend=data.reduce((s,x)=>s+x.spend,0);
  const totalPurchases=data.reduce((s,x)=>s+x.purchases,0);
  const totalValue=data.reduce((s,x)=>s+x.purchase_value,0);
  const totalRoas=totalSpend>0?totalValue/totalSpend:0;

  const snapshot={
    user_id:currentUser.id,
    account_id:activeAccountId,
    date_start:since,date_stop:until,
    level:activeTab,
    data:{
      total_spend:totalSpend.toFixed(2),
      total_purchases:totalPurchases,
      total_roas:totalRoas.toFixed(2),
      total_value:totalValue.toFixed(2),
      rows:data,
      period:activePeriod,
      saved_at:now()
    }
  };

  const{error}=await db.from('meta_snapshots').insert(snapshot);
  if(error){toast('Error al guardar: '+error.message,3000);return}
  await loadSnapshots();
  toast(`Snapshot guardado — ${data.length} ${activeTab} registrados`);
}

async function deleteSnapshot(id){
  await db.from('meta_snapshots').delete().eq('id',id);
  snapshots=snapshots.filter(s=>s.id!==id);
  if(activeTab==='snapshots')document.getElementById('tab-content').innerHTML=renderTabContent();
  toast('Snapshot eliminado');
}

// ── ADD ACCOUNT ───────────────────────────────────────────────────────────
function openAddAccount(){
  document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-title">Conectar cuenta de Meta Ads</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6">
        Ingresá el ID de tu cuenta publicitaria y el token de acceso. El token se guarda encriptado en tu base de datos.
      </p>
      <div class="field"><label>ID de la cuenta publicitaria</label><input id="ac-id" placeholder="Ej: act_770215768688778 o solo el número"/></div>
      <div class="field"><label>Nombre de la cuenta</label><input id="ac-name" placeholder="Ej: KIRIZ Project"/></div>
      <div class="field"><label>Access Token</label><input id="ac-token" type="password" placeholder="EAAORHcjG368..."/></div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Cancelar</button>
        <button class="btn primary" onclick="addAccount()">Conectar →</button>
      </div>
    </div></div>`;
}

async function addAccount(){
  let accountId=document.getElementById('ac-id').value.trim();
  const name=document.getElementById('ac-name').value.trim();
  const token=document.getElementById('ac-token').value.trim();
  if(!accountId||!token){toast('Completá el ID y el token',2000);return}
  if(!accountId.startsWith('act_'))accountId='act_'+accountId;

  // Verify token works
  const btn=document.querySelector('.modal-box .btn.primary');
  btn.disabled=true;btn.textContent='Verificando...';

  try{
    const res=await fetch(`https://graph.facebook.com/v19.0/${accountId}?fields=id,name,account_status&access_token=${token}`);
    const json=await res.json();
    if(json.error){toast('Token inválido: '+json.error.message,3000);btn.disabled=false;btn.textContent='Conectar →';return}

    const{error}=await db.from('meta_connections').upsert({
      user_id:currentUser.id,
      account_id:accountId,
      account_name:name||json.name||accountId,
      token,app_id:APP_ID
    });
    if(error){toast('Error al guardar: '+error.message,3000);return}

    await loadConnections();
    activeAccountId=accountId;
    activeConnection=connections.find(c=>c.account_id===accountId);
    renderAccountPills();
    enableButtons();
    closeModal();
    toast('Cuenta conectada ✓ Trayendo datos...');
    await fetchData(false);
    startAutoRefresh();
  }catch(e){
    toast('Error: '+e.message,3000);
    btn.disabled=false;btn.textContent='Conectar →';
  }
}

init();
</script>
